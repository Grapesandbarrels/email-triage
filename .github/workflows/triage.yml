name: Email Triage

on:
  schedule:
    - cron: "0 5,7,9,11,13,15,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        run: pip install requests anthropic

      - name: Email triage uitvoeren
        env:
          TENANT_ID:         ${{ secrets.TENANT_ID }}
          CLIENT_ID:         ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET:     ${{ secrets.CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USER_EMAIL:        ${{ secrets.USER_EMAIL }}
        run: python email_triage.py

      - name: Leerdata committen
        run: |
          git config user.name "email-triage-bot"
          git config user.email "actions@users.noreply.github.com"
          git add triage_history.json
          if ! git diff --cached --quiet; then
            git commit -m "Update leerdata triage_history.json [skip ci]"
            git push
          else
            echo "Geen wijzigingen in leerdata"
          fi
